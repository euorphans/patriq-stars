apiVersion: apps/v1
kind: Deployment
metadata:
  name: stars-bot-worker
  namespace: stars-bot
  labels:
    app.kubernetes.io/name: stars-bot
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: stars-bot
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stars-bot
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: stars-bot-worker
          image: stars-bot:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

          envFrom:
            - configMapRef:
                name: stars-bot-config

          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=12288 --report-on-signal=SIGSEGV --report-dir=/crash-reports --report-filename=crash.json"
            - name: UV_THREADPOOL_SIZE
              value: "4"
            - name: ENABLE_CRON
              value: "true"
            - name: ENABLE_BROADCAST
              value: "false"
            - name: ENABLE_SCREENSHOT
              value: "false"
            - name: LOG_LEVEL
              value: "verbose"
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: BOT_TOKEN
            - name: BOT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: BOT_ADMIN_TOKEN
            - name: BOT_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: BOT_URL
            - name: WEBHOOK_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: WEBHOOK_DOMAIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: DATABASE_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: REDIS_PASSWORD
            - name: WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: WALLET_ADDRESS
            - name: WALLET_MNEMONIC
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: WALLET_MNEMONIC
            - name: TONCENTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TONCENTER_API_KEY
            - name: TON_SUBWALLET_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TON_SUBWALLET_ID
            - name: TON_WALLET_TIMEOUT
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TON_WALLET_TIMEOUT
            - name: FRAGMENT_API_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_API_URL
            - name: FRAGMENT_STEL_SSID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_STEL_SSID
            - name: FRAGMENT_STEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_STEL_TOKEN
            - name: FRAGMENT_STEL_TON_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_STEL_TON_TOKEN
            - name: PLATEGA_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PLATEGA_MERCHANT_ID
            - name: PLATEGA_SECRET
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PLATEGA_SECRET
            - name: HELEKET_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_MERCHANT_ID
            - name: HELEKET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_API_KEY
            - name: HELEKET_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_CALLBACK_URL
            - name: PLATEGA_IP_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PLATEGA_IP_WHITELIST
                  optional: true
            - name: HELEKET_IP_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_IP_WHITELIST
                  optional: true
            - name: TELEGRAM_API_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TELEGRAM_API_ID
                  optional: true
            - name: TELEGRAM_API_HASH
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TELEGRAM_API_HASH
                  optional: true
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MISTRAL_API_KEY
                  optional: true
            - name: AGREEMENT_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: AGREEMENT_URL
                  optional: true
            - name: PRIVACY_POLICY_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PRIVACY_POLICY_URL
                  optional: true
            - name: SUPPORT_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: SUPPORT_URL
                  optional: true
            - name: STAR_PRICE_USD
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: STAR_PRICE_USD
                  optional: true
            - name: MIN_STARS_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MIN_STARS_PURCHASE
                  optional: true
            - name: MAX_STARS_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MAX_STARS_PURCHASE
                  optional: true
            - name: MIN_TON_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MIN_TON_PURCHASE
                  optional: true
            - name: MAX_TON_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MAX_TON_PURCHASE
                  optional: true

          startupProbe:
            httpGet:
              path: /api/health/startup
              port: http
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 20
            timeoutSeconds: 30

          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 8
            successThreshold: 1
            timeoutSeconds: 15

          # Requests must fit on the node alongside stars-bot + Redis + Postgres + other workers.
          # Bursts use limits; reserving 3 CPUs here prevented scheduling the main bot Deployment on small VMs.
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "12000m"
              memory: "16Gi"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: crash-reports
              mountPath: /crash-reports

      volumes:
        - name: crash-reports
          emptyDir: {}
