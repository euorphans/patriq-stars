# Kustomize: apply all manifests in order
#   kubectl apply -k k8s/
#
# Or apply individually:
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/secrets.yaml
#   kubectl apply -f k8s/configmap.yaml
#   kubectl apply -f k8s/redis/   # PostgreSQL — внешняя (Cloud SQL и т.д.), не деплоится
#   kubectl apply -f k8s/deployment.yaml
#   kubectl apply -f k8s/service.yaml
#   kubectl apply -f k8s/hpa.yaml
#   kubectl apply -f k8s/pdb.yaml
#
# Внешний HTTP(S): Google Cloud Load Balancer → NEG/порт на ноде. TLS — на стороне LB.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stars-bot

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - redis/statefulset.yaml
  - deployment.yaml
  - worker.yaml
  - broadcast-worker.yaml
  - screenshot-worker.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: stars-bot
