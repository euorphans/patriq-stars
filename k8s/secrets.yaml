# ⚠️  WARNING: This file is a TEMPLATE.
# In production, use one of the following instead of committing real secrets:
#   - Sealed Secrets (Bitnami)
#   - External Secrets Operator
#   - HashiCorp Vault
#   - Cloud provider secret managers (AWS Secrets Manager, GCP Secret Manager)
#
# To create secrets manually:
#   kubectl create secret generic stars-bot-secrets \
#     --namespace=stars-bot \
#     --from-literal=BOT_TOKEN=<token> \
#     --from-literal=BOT_ADMIN_TOKEN=<token> \
#     --from-literal=DATABASE_URL=<url> \
#     --from-literal=POSTGRES_USER=<user> \
#     --from-literal=POSTGRES_PASSWORD=<password> \
#     --from-literal=POSTGRES_DB=<db> \
#     --from-literal=REDIS_PASSWORD=<password> \
#     ...

apiVersion: v1
kind: Secret
metadata:
  name: stars-bot-secrets
  namespace: stars-bot
  labels:
    app.kubernetes.io/name: stars-bot
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Telegram
  BOT_TOKEN: "<REPLACE_ME>"
  BOT_ADMIN_TOKEN: "<REPLACE_ME>"
  BOT_URL: "<REPLACE_ME>"
  WEBHOOK_DOMAIN: "<REPLACE_ME>"

  # PostgreSQL (in-cluster StatefulSet postgresql-master) — пароль должен совпадать с DATABASE_URL
  POSTGRES_USER: "starsbot"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "starsbot"
  DATABASE_URL: "postgresql://starsbot:CHANGE_ME@postgresql-master.stars-bot.svc.cluster.local:5432/starsbot?schema=public"

  # Redis
  REDIS_PASSWORD: "<REPLACE_ME>"

  # TON wallet
  WALLET_ADDRESS: "<REPLACE_ME>"
  WALLET_MNEMONIC: "<REPLACE_ME>"
  TONCENTER_API_KEY: "<REPLACE_ME>"

  # Fragment
  FRAGMENT_API_URL: "<REPLACE_ME>"
  FRAGMENT_STEL_SSID: "<REPLACE_ME>"
  FRAGMENT_STEL_TOKEN: "<REPLACE_ME>"
  FRAGMENT_STEL_TON_TOKEN: "<REPLACE_ME>"

  # Payment providers
  PLATEGA_MERCHANT_ID: "<REPLACE_ME>"
  PLATEGA_SECRET: "<REPLACE_ME>"
  HELEKET_MERCHANT_ID: "<REPLACE_ME>"
  HELEKET_API_KEY: "<REPLACE_ME>"
  HELEKET_CALLBACK_URL: "<REPLACE_ME>"

  # Payment webhook IP whitelists (comma-separated IPs or CIDR ranges)
  PLATEGA_IP_WHITELIST: "<REPLACE_ME>"
  HELEKET_IP_WHITELIST: "<REPLACE_ME>"

  # MTProto (для отправки подарков через Telegram API)
  TELEGRAM_API_ID: "<REPLACE_ME>"
  TELEGRAM_API_HASH: "<REPLACE_ME>"
