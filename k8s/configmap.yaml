apiVersion: v1
kind: ConfigMap
metadata:
  name: stars-bot-config
  namespace: stars-bot
  labels:
    app.kubernetes.io/name: stars-bot
    app.kubernetes.io/component: config
data:
  # Application
  NODE_ENV: "production"
  APPLICATION_PORT: "3001"
  # Сессия бота в Redis: по умолчанию в коде 30 суток + продление при каждом апдейте (см. telegraf-config.factory)
  # TELEGRAF_SESSION_TTL_SECONDS: "2592000"

  # Redis (internal cluster DNS)
  REDIS_URL: "redis://redis-master.stars-bot.svc.cluster.local:6379"
  REDIS_DB: "0"
  USE_REDIS_SESSION: "true"

  # PostgreSQL: в кластере (Service postgresql-master), полный URL — DATABASE_URL в Secret stars-bot-secrets.

  # Webhook
  WEBHOOK_PATH: "/api/bot/webhook"

  # AGREEMENT_URL, PRIVACY_POLICY_URL, SUPPORT_URL — не здесь: задаются в .env на сервере и попадают в
  # Secret stars-bot-secrets (./scripts/deploy.sh --update-secrets). Так же как BOT_TOKEN.

  # Скриншоты заказов: каталог внутри контейнера (см. volumeMount в deployment / screenshot-worker)
  LOCAL_STORAGE_PATH: "/data/local-storage"

  # Frontend (CORS allowed origins, comma-separated)
  FRONTEND_URL: "https://grim.llc"
  CORS_EXTRA_ORIGINS: ""

  # TON streaming (Toncenter SSE): worker overrides TON_STREAMING_ENABLED=true
  TON_STREAMING_ENABLED: "false"
  TON_STREAMING_MIN_FINALITY: "confirmed"
  TON_STREAMING_MIN_HINT_GAP_MS: "2000"

  # STAR_PRICE_USD, MIN_STARS_PURCHASE, MAX_STARS_PURCHASE, MIN_TON_PURCHASE, MAX_TON_PURCHASE — в .env → Secret
  # (см. deployment env secretKeyRef и ./scripts/deploy.sh --update-secrets).
