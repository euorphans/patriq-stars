apiVersion: v1
kind: ConfigMap
metadata:
  name: stars-bot-config
  namespace: stars-bot
  labels:
    app.kubernetes.io/name: stars-bot
    app.kubernetes.io/component: config
data:
  # Application
  NODE_ENV: "production"
  APPLICATION_PORT: "3001"

  # Redis (internal cluster DNS)
  REDIS_URL: "redis://redis-master.stars-bot.svc.cluster.local:6379"
  REDIS_DB: "0"
  USE_REDIS_SESSION: "true"

  # PostgreSQL: в кластере (Service postgresql-master), полный URL — DATABASE_URL в Secret stars-bot-secrets.

  # Webhook
  WEBHOOK_PATH: "/api/bot/webhook"

  # Legal / Public offer links (профиль/старт и т.д.)
  AGREEMENT_URL: "https://telegra.ph/Politika-konfidencialnosti-02-15-91"
  PRIVACY_POLICY_URL: "https://telegra.ph/Pravila-ispolzovaniya-02-15-2"

  # Экран «Информация» в боте — только эти URL (MainKeyboard.getInfoMenu)
  INFO_RULES_URL: "https://telegra.ph/Pravila-ispolzovaniya-02-15-2"
  INFO_PRIVACY_URL: "https://telegra.ph/Politika-konfidencialnosti-02-15-91"
  INFO_OFFER_URL: "https://telegra.ph/Politika-konfidencialnosti-02-15-91"
  INFO_SUPPORT_URL: "https://t.me/Mops_Support"
  # FRANCHISE_URL: при необходимости — ссылка для кнопки «Франшизы»

  # Прочие сообщения об ошибках / доставке (не экран «Информация»)
  SUPPORT_URL: "https://t.me/Mops_Support"

  # Скриншоты заказов: каталог внутри контейнера (см. volumeMount в deployment / screenshot-worker)
  LOCAL_STORAGE_PATH: "/data/local-storage"

  # Frontend (CORS allowed origins, comma-separated)
  FRONTEND_URL: "https://fh34hfhfw9efhjsdhkjsfd.lol"
  CORS_EXTRA_ORIGINS: ""

  # Pricing defaults
  STAR_PRICE_USD: "0.015"
  MIN_STARS_PURCHASE: "50"
  MAX_STARS_PURCHASE: "500000"
  MIN_TON_PURCHASE: "1"
  MAX_TON_PURCHASE: "10000"
