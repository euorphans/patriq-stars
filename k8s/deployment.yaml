apiVersion: apps/v1
kind: Deployment
metadata:
  name: stars-bot
  namespace: stars-bot
  labels:
    app.kubernetes.io/name: stars-bot
    app.kubernetes.io/component: bot
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: stars-bot
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stars-bot
        app.kubernetes.io/component: bot
    spec:
      # Graceful shutdown: Kubernetes sends SIGTERM, waits this long, then SIGKILL
      terminationGracePeriodSeconds: 30

      containers:
        - name: stars-bot
          image: stars-bot:latest
          imagePullPolicy: Never
          ports:
            # Внутренний порт приложения (SERVICE → targetPort http). Снаружи: Ingress Traefik + cert-manager (см. scripts/deploy.sh).
            - name: http
              containerPort: 3001
              protocol: TCP

          # Graceful shutdown before SIGKILL
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: stars-bot-config

          # Environment from Secrets
          env:
            - name: ENABLE_CRON
              value: "false"
            - name: ENABLE_BROADCAST
              value: "false"
            - name: ENABLE_SCREENSHOT
              value: "false"
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: BOT_TOKEN
            - name: BOT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: BOT_ADMIN_TOKEN
            - name: BOT_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: BOT_URL
            - name: WEBHOOK_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: WEBHOOK_DOMAIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: DATABASE_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: REDIS_PASSWORD
            - name: WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: WALLET_ADDRESS
            - name: WALLET_MNEMONIC
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: WALLET_MNEMONIC
            - name: TONCENTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TONCENTER_API_KEY
            - name: FRAGMENT_API_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_API_URL
            - name: FRAGMENT_STEL_SSID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_STEL_SSID
            - name: FRAGMENT_STEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_STEL_TOKEN
            - name: FRAGMENT_STEL_TON_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: FRAGMENT_STEL_TON_TOKEN
            - name: PLATEGA_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PLATEGA_MERCHANT_ID
            - name: PLATEGA_SECRET
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PLATEGA_SECRET
            - name: HELEKET_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_MERCHANT_ID
            - name: HELEKET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_API_KEY
            - name: HELEKET_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_CALLBACK_URL
            - name: PLATEGA_IP_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PLATEGA_IP_WHITELIST
                  optional: true
            - name: HELEKET_IP_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: HELEKET_IP_WHITELIST
                  optional: true
            - name: TELEGRAM_API_ID
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TELEGRAM_API_ID
                  optional: true
            - name: TELEGRAM_API_HASH
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: TELEGRAM_API_HASH
                  optional: true
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MISTRAL_API_KEY
                  optional: true

            # Документы и поддержка — из Secret (= переменные из .env при --update-secrets), перебивают envFrom
            - name: AGREEMENT_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: AGREEMENT_URL
                  optional: true
            - name: PRIVACY_POLICY_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: PRIVACY_POLICY_URL
                  optional: true
            - name: SUPPORT_URL
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: SUPPORT_URL
                  optional: true
            - name: STAR_PRICE_USD
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: STAR_PRICE_USD
                  optional: true
            - name: MIN_STARS_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MIN_STARS_PURCHASE
                  optional: true
            - name: MAX_STARS_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MAX_STARS_PURCHASE
                  optional: true
            - name: MIN_TON_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MIN_TON_PURCHASE
                  optional: true
            - name: MAX_TON_PURCHASE
              valueFrom:
                secretKeyRef:
                  name: stars-bot-secrets
                  key: MAX_TON_PURCHASE
                  optional: true

          # --- Health checks ---

          # Startup probe: give the app up to 60s to start (30 * 2s)
          startupProbe:
            httpGet:
              path: /api/health/startup
              port: http
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 3

          # Liveness probe: restart pod if the event loop is stuck
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe: stop routing traffic if dependencies are down
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 10

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "3000m"
              memory: "4Gi"

          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: local-snapshots
              mountPath: /data/local-storage

      volumes:
        - name: local-snapshots
          emptyDir: {}

      # Pull secrets if using private registry
      # imagePullSecrets:
      #   - name: registry-credentials
